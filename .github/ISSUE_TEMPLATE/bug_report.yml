name: 🐞 Bug report
description: A parsing result that's wrong, a panic, a docs error, a build problem.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Not a security issue, right?** Anything that lets a caller make
        `spiffe-id` accept a should-reject ID, reject a should-accept one, mis-report a component,
        or blow up resources on a bounded input → **don't file it here** — see
        [SECURITY.md](https://github.com/sanguinehost/wimse/blob/main/SECURITY.md) and report it
        privately. (A "the parser accepts X but the SPIFFE spec says reject it" finding is usually
        a security report — when in doubt, report privately.)

        The best bug report for this crate is **a failing test**: a `SpiffeId::parse("…")` call (or
        an accessor call) that returns the wrong thing, with the spec text that says otherwise.
  - type: input
    id: version
    attributes:
      label: spiffe-id version
      placeholder: "0.1.0 (from Cargo.toml / Cargo.lock) — or a git rev"
    validations:
      required: true
  - type: input
    id: toolchain
    attributes:
      label: Rust toolchain & target
      placeholder: "e.g. stable 1.83.0, x86_64-unknown-linux-gnu — or wasm32-unknown-unknown"
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: >-
        Ideally a minimal `#[test]` (or a `fn main()`) that shows the wrong behaviour — the
        input string, what you called, what you got, what you expected.
      render: rust
      placeholder: |
        let id = spiffe_id::SpiffeId::parse("spiffe://example.org/…");
        // got: ...
        // expected: ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should happen, and why
      description: >-
        What's the correct behaviour? If it's a spec-compliance issue, quote/link the relevant part
        of the SPIFFE-ID spec (or the WIMSE doc) — that's the authority.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Anything else
      description: How you hit it, how it affects you, mitigations you've found, etc. (optional)
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmations
      options:
        - label: This is not a security vulnerability (those go to security@twn.systems — see SECURITY.md).
          required: true
        - label: I checked the [open issues](https://github.com/sanguinehost/wimse/issues) and didn't find a duplicate.
          required: true
